<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-ancestors 'none';
        img-src 'self' data: https:;
        media-src 'self' https:;
        font-src 'self' https://fonts.gstatic.com data:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        connect-src 'self' https:;
        upgrade-insecure-requests
      "
    />
    
    <!-- Primary Meta Tags -->
    <title>Aryan Moudgill - Portfolio</title>
    <meta name="title" content="Aryan Moudgill - Portfolio" />
    <meta name="description" content="Portfolio of Aryan Moudgill, specializing in high-end, cinematic digital architecture, strategic content, and AI-driven technical logic." />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aryanmoudgill.com/" />
    <meta property="og:title" content="Aryan Moudgill - Portfolio" />
    <meta property="og:description" content="Portfolio of Aryan Moudgill, specializing in high-end, cinematic digital architecture, strategic content, and AI-driven technical logic." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aryanmoudgill.com/" />
    <meta property="twitter:title" content="Aryan Moudgill - Portfolio" />
    <meta property="twitter:description" content="Portfolio of Aryan Moudgill, specializing in high-end, cinematic digital architecture, strategic content, and AI-driven technical logic." />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- ── Critical above-fold assets (preload = highest priority) ── -->
    <link rel="preload" as="image" href="/optimized/hero-video.jpg" fetchpriority="high" />
    <link rel="preload" as="image" href="/favicon.png" fetchpriority="high" />
    <link rel="preload" as="video" href="/optimized/hero-video.webm" type="video/webm" fetchpriority="high" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" />

    <!-- ── Below-fold video posters ── -->
    <link rel="preload" as="image" href="/optimized/about-video.jpg" />
    <link rel="preload" as="image" href="/optimized/red_flow.jpg" />
    <link rel="preload" as="image" href="/optimized/flow-blue.jpg" />
    <link rel="preload" as="image" href="/optimized/flow-green-final.jpg" />
    <link rel="preload" as="image" href="/optimized/flow-white.jpg" />

    <!-- ── Below-fold videos (prefetch = lower priority, after critical) ── -->
    <link rel="prefetch" as="video" href="/optimized/about-video.webm" />
    <link rel="prefetch" as="video" href="/optimized/red_flow.webm" />
    <link rel="prefetch" as="video" href="/optimized/flow-blue.webm" />
    <link rel="prefetch" as="video" href="/optimized/flow-green-final.webm" />
    <link rel="prefetch" as="video" href="/optimized/flow-white.webm" />

    <!-- ── Music tracks ── -->
    <link rel="prefetch" as="audio" href="/music_home.mp3" />
    <link rel="prefetch" as="audio" href="/music_projects.mp3" />
    <link rel="prefetch" as="audio" href="/music_expertise.mp3" />
    <link rel="prefetch" as="audio" href="/music_contact.mp3" />

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-black text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
